server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Deny access to .php files, matching the original .htaccess behavior
    location ~ \.php$ {
        deny all;
    }

    # Enable clean URLs (e.g. /about -> /about.html)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache control for static assets (images, CSS, JS, fonts, videos)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|otf|webp|mp4|webm)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
}
